# רץ בכל דחיפה ל־main: בדיקות אנליטיקס + בדיקת לינק קונטקט (mailto).
name: Analytics Logic Tests

run-name: "Analytics tests · ${{ github.ref_name }} · ${{ github.sha }}"

on:
  workflow_dispatch:
  push:
    branches:
      - main
  # כל דחיפה ל־main מריצה את בדיקות האנליטיקס + בדיקת לינק קונטקט
  pull_request:
    paths:
      - "scripts/analytics-summary.test.js"
      - "scripts/analytics-summary.js"
      - "scripts/contact-link.test.js"
      - "scripts/fixtures/**"
      - "data/analytics.jsonl"
      - "index.html"
      - "package.json"
      - ".github/workflows/analytics-tests.yml"

jobs:
  analytics-summary-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run analytics summary fixture test
        run: node scripts/analytics-summary.test.js

      - name: בדיקת לינק קונטקט (mailto)
        run: node scripts/contact-link.test.js
