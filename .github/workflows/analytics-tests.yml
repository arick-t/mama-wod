# רץ בכל דחיפה ל־main: בדיקות אנליטיקס + בדיקת לינק קונטקט (mailto).
# לא רץ על קומיטים שמשנים רק data/analytics.jsonl (מנוע api/event) — חוסך ריצות ורעש.
name: Analytics Logic Tests

run-name: "Analytics tests · ${{ github.ref_name }} · ${{ github.sha }}"

concurrency:
  group: analytics-tests-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "data/analytics.jsonl"
  # כל דחיפה ל־main מריצה את בדיקות האנליטיקס + בדיקת לינק קונטקט
  pull_request:
    paths:
      - "scripts/analytics-summary.test.js"
      - "scripts/analytics-summary.js"
      - "scripts/contact-link.test.js"
      - "scripts/fixtures/**"
      - "data/analytics.jsonl"
      - "index.html"
      - "package.json"
      - ".github/workflows/analytics-tests.yml"

jobs:
  analytics-summary-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run analytics summary fixture test
        run: node scripts/analytics-summary.test.js

      - name: בדיקת לינק קונטקט (mailto + Vercel חי)
        env:
          # אותו דומיין כמו ב־ANALYTICS ב־index.html – בודקים שהפריסה בפועל מכילה mailto
          CONTACT_LINK_TEST_URL: https://mama-wod.vercel.app
        run: node scripts/contact-link.test.js
