# לא רץ אוטומטית על push ל־main (פחות רעש ב־CI). הרצה ידנית: Actions → Run workflow. PR: עדיין רץ כשמשנים קבצים רלוונטיים.
name: Analytics Logic Tests

run-name: "Analytics tests · ${{ github.ref_name }} · ${{ github.sha }}"

concurrency:
  group: analytics-tests-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/analytics-summary.test.js"
      - "scripts/analytics-summary.js"
      - "scripts/contact-link.test.js"
      - "scripts/fixtures/**"
      - "data/analytics.jsonl"
      - "index.html"
      - "package.json"
      - ".github/workflows/analytics-tests.yml"

jobs:
  analytics-summary-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Analytics tests + contact mailto (live Vercel)
        env:
          CONTACT_LINK_TEST_URL: https://mama-wod.vercel.app
        run: node scripts/analytics-summary.test.js && node scripts/contact-link.test.js
