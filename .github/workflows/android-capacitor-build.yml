name: Android Capacitor Build Check

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  android-build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor projects
        run: npm run cap:sync

      - name: Build Android debug APK
        run: |
          cd android
          ./gradlew assembleDebug
