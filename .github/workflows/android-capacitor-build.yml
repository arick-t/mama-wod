# כבוי אוטומטית — רק הרצה ידנית (Actions → Run workflow). יופעל מחדש כשנחזור לטפל בצלילי השעון / מובייל.
name: Android Capacitor Build Check

run-name: "Android Capacitor · ${{ github.ref_name }} · ${{ github.sha }}"

on:
  workflow_dispatch:

jobs:
  android-build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor projects
        run: npm run cap:sync

      - name: Build Android debug APK
        run: |
          cd android
          ./gradlew assembleDebug
