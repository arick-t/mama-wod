# ידני בלבד (Actions → Run workflow). סימון upload_apk מעלה artifact כמו workflow הישן android-device-build.
name: Android Capacitor Build Check

run-name: "Android Capacitor · ${{ github.ref_name }} · ${{ github.sha }}"

on:
  workflow_dispatch:
    inputs:
      upload_apk:
        description: 'Upload debug APK artifact'
        type: boolean
        default: false

jobs:
  android-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: npm install
      - run: npm run cap:sync
      - run: cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        if: ${{ inputs.upload_apk }}
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
