# רץ רק כשמשתנה קוד שקשור לאנדרואיד/Capacitor — לא על קומיטים מסוג analytics בלבד.
name: Android Capacitor Build Check

run-name: "Android Capacitor · ${{ github.ref_name }} · ${{ github.sha }}"

on:
  workflow_dispatch:
  push:
    paths:
      - "android/**"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.json"
      - "web/**"
      - "scripts/build-capacitor-web.js"
      - "index.html"
      - ".github/workflows/android-capacitor-build.yml"
  pull_request:
    paths:
      - "android/**"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.json"
      - "web/**"
      - "scripts/build-capacitor-web.js"
      - "index.html"
      - ".github/workflows/android-capacitor-build.yml"

jobs:
  android-build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor projects
        run: npm run cap:sync

      - name: Build Android debug APK
        run: |
          cd android
          ./gradlew assembleDebug
