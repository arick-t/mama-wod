name: 🦆 Daily Workout Fetch


on:
  schedule:
    - cron: '0 1 * * *'  # ~3 AM Israel time (UTC+2/UTC+3, GitHub uses UTC)
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
      - '.github/workflows/daily-fetch.yml'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 lxml
    
    - name: Fetch workouts
      run: |
        cd backend
        python fetch_all.py
    
    - name: Commit and push
      run: |
        git config user.name "DUCK-WOD Bot"
        git config user.email "bot@duck-wod.app"
        git add data/workouts.json data/special_cache.json
        git diff --quiet && git diff --staged --quiet || \
          (git commit -m "🦆 Daily fetch $(date +'%Y-%m-%d')" && git push)
