name: 🦆 Daily Workout Fetch

# תזמון: ריצה 1 = 05:30 ישראל (אירופה/UK). ריצה 2 = 08:00–09:00 ישראל (מקורות US). ראה docs/FETCH_SCHEDULE.md
on:
  schedule:
    - cron: '30 3 * * *'   # 05:30 Israel – Europe/UK (MYLEO, Ton Bridge) after 00:01
    - cron: '0 6 * * *'    # 08:00–09:00 Israel – US sources (1013, Linchpin, CrossFit.com, Restoration) after their evening publish
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
      - '.github/workflows/daily-fetch.yml'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 lxml
    
    - name: Fetch workouts
      env:
        TZ: Asia/Jerusalem
      run: |
        cd backend
        python fetch_all.py
    
    - name: Commit and push
      run: |
        git config user.name "DUCK-WOD Bot"
        git config user.email "bot@duck-wod.app"
        git add data/workouts.json data/special_cache.json
        git diff --quiet && git diff --staged --quiet || \
          (git commit -m "🦆 Daily fetch $(date +'%Y-%m-%d')" && git push)
