name: 🦆 Daily Workout Fetch

# תזמון: ריצה 0 = ~05:00 ישראל (חורף). ריצה 1 = 05:30 ישראל. ריצה 2 = 08:00 ישראל (US). ראה docs/FETCH_SCHEDULE.md
on:
  schedule:
    - cron: '0 3 * * *'    # 05:00 Israel (UTC+2 winter) — extra early; ~06:00 in summer
    - cron: '30 3 * * *'   # 05:30 Israel – Europe/UK (MYLEO, Ton Bridge) after 00:01
    - cron: '0 6 * * *'    # 08:00 Israel – US sources (1013, official site, Restoration)
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
      - '.github/workflows/daily-fetch.yml'

permissions:
  contents: write

concurrency:
  group: daily-fetch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 lxml
    
    - name: Fetch workouts
      env:
        TZ: Asia/Jerusalem
      run: |
        cd backend
        python fetch_all.py

    - name: Stash fetch results, pull latest main, unstash
      run: |
        git stash push -m "fetch" data/workouts.json data/special_cache.json
        git pull --rebase origin main
        git stash pop

    - name: Commit and push
      run: |
        git config user.name "DUCK-WOD Bot"
        git config user.email "bot@duck-wod.app"
        git add data/workouts.json data/special_cache.json
        git diff --quiet && git diff --staged --quiet || \
          (git commit -m "🦆 Daily fetch $(date +'%Y-%m-%d')" && git push origin main)
