# Fetch יומי — 5 קרונים (כולל מיד אחרי חצות ישראל) + ~05:00 / 05:30 / 08:00 חורף. פירוט: docs/FETCH_SCHEDULE.md
name: 🦆 Daily Workout Fetch

on:
  schedule:
    # מפחית חלון "אין אימונים להיום": זמן קצר אחרי שהתאריך בישראל מתחלף (~01:00 חורף / ~02:00 קיץ)
    - cron: '0 23 * * *'   # ≈01:00 Israel (UTC+2 winter) — first fill for new calendar day
    - cron: '0 1 * * *'    # ≈03:00 Israel winter — EU/UK sources; shrinks midnight→first-data gap vs old 05:00-only start
    - cron: '0 3 * * *'    # 05:00 Israel (UTC+2 winter) — ~06:00 in summer
    - cron: '30 3 * * *'   # 05:30 Israel – Europe/UK (MYLEO, Ton Bridge) after 00:01
    - cron: '0 6 * * *'    # 08:00 Israel – US sources (1013, official site, Restoration)
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
      - '.github/workflows/daily-fetch.yml'

permissions:
  contents: write

concurrency:
  group: daily-fetch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests beautifulsoup4 lxml
    - name: Fetch workouts
      env: { TZ: Asia/Jerusalem }
      run: cd backend && python fetch_all.py
    - name: Stash, pull main, pop, commit push
      run: |
        git stash push -m "fetch" data/workouts.json data/special_cache.json
        git pull --rebase origin main && git stash pop
        git config user.name "DUCK-WOD Bot" && git config user.email "bot@duck-wod.app"
        git add data/workouts.json data/special_cache.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🦆 Daily fetch $(date +'%Y-%m-%d')" && git push origin main)
