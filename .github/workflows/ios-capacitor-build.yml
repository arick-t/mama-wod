# רץ רק כשמשתנה קוד שקשור ל־iOS/Capacitor — לא על קומיטים מסוג analytics בלבד.
name: iOS Capacitor Build Check

run-name: "iOS Capacitor · ${{ github.ref_name }} · ${{ github.sha }}"

on:
  workflow_dispatch:
  push:
    paths:
      - "ios/**"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.json"
      - "web/**"
      - "scripts/build-capacitor-web.js"
      - "index.html"
      - ".github/workflows/ios-capacitor-build.yml"
  pull_request:
    paths:
      - "ios/**"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.json"
      - "web/**"
      - "scripts/build-capacitor-web.js"
      - "index.html"
      - ".github/workflows/ios-capacitor-build.yml"

jobs:
  ios-build-check:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor projects
        run: npm run cap:sync

      - name: Build iOS app (no signing)
        run: xcodebuild -workspace ios/App/App.xcworkspace -scheme App -sdk iphonesimulator -configuration Debug CODE_SIGNING_ALLOWED=NO build
