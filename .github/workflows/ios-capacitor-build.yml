# כבוי אוטומטית — רק הרצה ידנית (Actions → Run workflow). יופעל מחדש כשנחזור לטפל בצלילי השעון / מובייל.
name: iOS Capacitor Build Check

run-name: "iOS Capacitor · ${{ github.ref_name }} · ${{ github.sha }}"

on:
  workflow_dispatch:

jobs:
  ios-build-check:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor projects
        run: npm run cap:sync

      - name: Build iOS app (no signing)
        run: xcodebuild -workspace ios/App/App.xcworkspace -scheme App -sdk iphonesimulator -configuration Debug CODE_SIGNING_ALLOWED=NO build
