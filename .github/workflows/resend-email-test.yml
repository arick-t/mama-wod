# בדיקת חיבור Resend – שליחת מייל קצר לכתובת הפרויקט.
# Actions → resend-email-test → Run workflow (אחרי ש-RESEND_API_KEY מוגדר).
# התוכן: "בדיקת תקינה לעדכון גרסה X.Y.Z" לפי package.json (אותו מספר גרסה כמו ב-release).

name: ✉️ Resend email test

on:
  workflow_dispatch:
    inputs:
      to_address:
        description: 'כתובת יעד (ריק = contact.duckwod@gmail.com)'
        required: false
        default: ''
        type: string

jobs:
  send-test:
    runs-on: ubuntu-latest
    env:
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_SECRET: ${{ secrets.RESEND_FROM }}
    steps:
      - uses: actions/checkout@v4

      - name: Send test email
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "::error::חסר Secret RESEND_API_KEY ב-Repository secrets."
            exit 1
          fi
          TO="${{ github.event.inputs.to_address }}"
          TO="${TO:-contact.duckwod@gmail.com}"
          if [ -z "$RESEND_FROM_SECRET" ]; then
            FROM="DUCK-WOD <onboarding@resend.dev>"
          else
            FROM="$RESEND_FROM_SECRET"
          fi
          VERSION=$(node -p "require('./package.json').version")
          TEXT="בדיקת תקינה לעדכון גרסה ${VERSION}"
          SUBJECT="DUCK-WOD – ${TEXT}"
          BODY="${TEXT}"
          jq -n \
            --arg from "$FROM" \
            --arg to "$TO" \
            --arg sub "$SUBJECT" \
            --arg text "$BODY" \
            '{from:$from, to:[$to], subject:$sub, text:$text}' > payload.json
          HTTP=$(curl -sS -w "%{http_code}" -o resp.json -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d @payload.json)
          if [ "$HTTP" != "200" ]; then
            echo "::error::Resend החזיר HTTP $HTTP"
            cat resp.json
            exit 1
          fi
          cat resp.json
          echo ""
          echo "נשלח ל: $TO (גרסה ${VERSION})"
