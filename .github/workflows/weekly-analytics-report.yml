# דוח ניתור שבועי – נשלח לאימייל כל יום שישי 08:00.
# שליחה דרך Resend SMTP – Secret: RESEND_API_KEY. ראו RESEND_SECRETS.md.

name: 📊 Weekly Analytics Report

on:
  schedule:
    # כל יום שישי 08:00 ישראל (05:00 UTC)
    - cron: '0 5 * * 5'
  workflow_dispatch:
    inputs:
      use_sample_data:
        description: 'שליחת דוח דוגמה (מודל) מהשבוע האחרון – פעם אחת לבדיקה'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use sample data (for one-time model run)
        if: ${{ github.event.inputs.use_sample_data == 'true' }}
        run: |
          if [ -f data/analytics_sample_last_week.jsonl ]; then
            cp data/analytics_sample_last_week.jsonl data/analytics.jsonl
          else
            echo "Sample file data/analytics_sample_last_week.jsonl not in repo – add and push it for model runs. Proceeding without sample."
          fi

      - name: Generate report
        id: gen
        run: |
          if [ ! -f data/analytics.jsonl ] || [ ! -s data/analytics.jsonl ]; then
            echo "דוח ניתור משתמשים – השבוע האחרון" > report.txt
            echo "" >> report.txt
            echo "עדיין אין נתונים בקובץ data/analytics.jsonl." >> report.txt
            echo "הפעל את הניתור (ANALYTICS_ENDPOINT) וצבור כניסות ואירועי Find Workout – בשבוע הבא תקבל כאן סיכום אמיתי." >> report.txt
          elif [ -f scripts/analytics-summary.js ]; then
            node scripts/analytics-summary.js > report.txt 2>&1
          else
            echo "דוח ניתור – השבוע האחרון" > report.txt
            echo "" >> report.txt
            echo "יש נתונים אבל סקריפט הסיכום (scripts/analytics-summary.js) חסר ב-repo. הוסף אותו ל-main." >> report.txt
          fi
          echo "text<<EOF" >> $GITHUB_OUTPUT
          cat report.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send email via Resend SMTP
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.resend.com
          server_port: 465
          secure: true
          username: resend
          password: ${{ secrets.RESEND_API_KEY }}
          subject: "ניתור משתמשים שבועי"
          to: ariel.tahan@gmail.com
          from: onboarding@resend.dev
          body: ${{ steps.gen.outputs.text }}
