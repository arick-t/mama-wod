# דוח ניתור — Resend. Secrets: RESEND_API_KEY (או RESEND_API_KEY_conmail). פירוט: RESEND_SECRETS.md. לוגיקה: scripts/ci-weekly-analytics-report.sh
name: 📊 Weekly Analytics Report

on:
  schedule:
    - cron: '0 4 * * 5'
  workflow_dispatch:
    inputs:
      report_period:
        description: 'תקופת הדוח'
        required: true
        default: 'last_week'
        type: choice
        options: [last_day, yesterday_today, last_week, from_date]
      from_date:
        description: 'מתאריך YYYY-MM-DD (רק מ-from_date)'
        required: false
        type: string
      use_sample_data:
        description: 'דוח דוגמה מקובץ sample'
        required: false
        default: false
        type: boolean
      email_to:
        description: 'יעד (ריק = ברירת מחדל / Secret)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate report & send via Resend
        env:
          REPORT_PERIOD: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.report_period || 'last_week' }}
          REPORT_FROM_DATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.from_date || '' }}
          USE_SAMPLE_DATA: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.use_sample_data || 'false' }}
          EMAIL_TO_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.email_to || '' }}
          RESEND_FROM_SECRET: ${{ secrets.RESEND_FROM }}
          ANALYTICS_TO_SECRET: ${{ secrets.ANALYTICS_REPORT_TO }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || secrets.RESEND_API_KEY_conmail }}
        run: bash scripts/ci-weekly-analytics-report.sh
